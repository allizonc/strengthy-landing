<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Strengthy - Account Confirmed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #f2f2f2;
      --text-primary: #0a0a0a;
      --text-tertiary: #888888; /* Slightly darker for better readability */
      --accent: #0a0a0a;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .content-wrapper {
      max-width: 480px; /* Slightly narrower for a more elegant look */
      width: 100%;
      text-align: center;
    }

    .content { 
      background: var(--white);
      padding: 48px 32px;
      border-radius: 16px; /* Smoother corners */
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
      animation: fadeIn 0.8s ease-out; 
    }

    .logo {
      display: block;
      height: 60px; /* Scaled down for professionalism */
      margin: 0 auto 2.5rem;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .logo img { height: 100%; width: auto; }

    @keyframes fadeIn { from {opacity:0} to {opacity:1} }
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(20px) }
      to   { opacity:1; transform:translateY(0)  }
    }
    
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 4vw, 2.8rem); /* Smaller, more controlled size */
      letter-spacing: 0.03em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }

    .subtitle {
      font-size: 0.95rem; /* Tighter body text */
      line-height: 1.6;
      color: var(--text-tertiary);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }
    
    .cta-btn {
        display: inline-flex;
        align-items: center;
        padding: 14px 28px; /* Slightly more compact */
        border-radius: 8px; /* Modern square-ish look vs pill */
        text-decoration: none;
        font-weight: 600;
        font-size: 0.875rem;
        background: var(--accent);
        color: var(--white);
        transition: all 0.2s ease;
        opacity: 0;
        animation: fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }

    .cta-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .footer-note {
      color: var(--text-tertiary);
      font-size: 0.75rem;
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <div class="logo">
      <img src="images/icon.png" alt="Strengthy" />
    </div>

    <div class="content">
      <h1 id="status-title">Verifying...</h1>
      <p id="status-message" class="subtitle">Please wait while we confirm your account.</p>

      <a id="cta-button" 
         href="#" 
         class="cta-btn" 
         style="display: none;">
         Open Strengthy App
      </a>
    </div>

    <p class="footer-note">© Strengthy by Allizonc</p>
  </div>

<script>
    const DEEP_LINK_SCHEME = 'strengthy://auth-callback';
    
    function handleConfirmation() {
        const statusTitle = document.getElementById('status-title');
        const statusMessage = document.getElementById('status-message');
        const ctaButton = document.getElementById('cta-button');

        // Detect if user is on a mobile device
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        let urlParams;
        let redirectFragment = '';

        if (window.location.hash) {
            redirectFragment = window.location.hash.substring(1);
        } else if (window.location.search) {
            redirectFragment = window.location.search.substring(1);
        }
        
        urlParams = new URLSearchParams(redirectFragment);
        const error = urlParams.get('error');
        const accessToken = urlParams.get('access_token');
        const confirmationCode = urlParams.get('code');

        if (error) {
            statusTitle.textContent = "Unable to Verify";
            statusMessage.textContent = "This link may have expired. Please try signing up again from the app.";
        } else if (accessToken || confirmationCode) {
            statusTitle.textContent = "Account Confirmed";
            const deepLinkUrl = `${DEEP_LINK_SCHEME}?${redirectFragment}`;

            if (isMobile) {
                // AUTO-OPEN ONLY ON MOBILE
                statusMessage.textContent = "Success! Redirecting you to the app...";
                window.location.replace(deepLinkUrl);
                
                // Fallback button if redirect fails
                setTimeout(() => {
                    statusMessage.textContent = "If the app didn't open, click the button below.";
                    ctaButton.href = deepLinkUrl;
                    ctaButton.style.display = 'inline-flex';
                }, 2500);
            } else {
                // ON DESKTOP: Don't auto-open. Show friendly instructions.
                statusMessage.innerHTML = "Your account is verified. To start your journey, please open the <b>Strengthy</b> app on your mobile device.";
                ctaButton.textContent = "Get the App";
                ctaButton.href = "https://apps.apple.com/app/"; // Update with your actual App Store link
                ctaButton.style.display = 'inline-flex';
            }
        } else {
            statusTitle.textContent = "Invalid Request";
            statusMessage.textContent = "Please use the link provided in your confirmation email.";
        }
    }

    window.onload = handleConfirmation;
</script>
</body>
</html>
